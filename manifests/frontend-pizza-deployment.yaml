apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-pizza-deployment
  labels:
    app: pizza-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pizza-web
  template:
    metadata:
      labels:
        app: pizza-web
    spec:
      containers:
      - name: pizza-web
        image: REPLACE_WITH_DOCKERHUB_USER/pizza-frontend:00
        imagePullPolicy: Always
        ports:
        - containerPort: 80
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

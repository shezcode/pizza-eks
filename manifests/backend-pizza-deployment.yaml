apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-pizza-deployment
  labels:
    app: pizza-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pizza-api
  template:
    metadata:
      labels:
        app: pizza-api
    spec:
      containers:
      - name: pizza-api
        image: REPLACE_WITH_DOCKERHUB_USER/pizza-backend:00
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        - name: ConnectionStrings__PizzaDb
          valueFrom:
            secretKeyRef:
              name: pizza-db-secret
              key: connection-string
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

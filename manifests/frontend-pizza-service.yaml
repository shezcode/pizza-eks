apiVersion: v1
kind: Service
metadata:
  name: frontend-pizza-svc
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: http
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: arn:aws:acm:us-east-1:658280525416:certificate/90d0a788-a8f5-47e5-81a0-2f4a0936e470
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "https"
  labels:
    app: pizza-web
spec:
  selector:
    app: pizza-web
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 80
  type: LoadBalancer
